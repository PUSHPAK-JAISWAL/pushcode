<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>PushCode IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <style>
        /* Force the terminal to fill its parent */
        .terminal { padding: 10px; height: 100%; }
        .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body class="bg-[#0d1117] text-gray-300 h-screen flex flex-col overflow-hidden">

    <header class="h-14 border-b border-gray-800 bg-[#161b22] flex items-center justify-between px-6 shrink-0">
        <span class="text-blue-500 font-bold text-xl tracking-tighter">PUSHCODE</span>
        <div class="flex items-center gap-4">
            <select id="langSelect" class="bg-[#21262d] border border-gray-700 rounded px-2 py-1 text-sm outline-none">
                <option value="JAVA">Java</option>
                <option value="PYTHON">Python</option>
                <option value="C">C</option>
                <option value="CPP">C++</option>
            </select>
            <button id="runBtn" class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-1 rounded text-sm font-bold transition-all">
                Run Code
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <div class="w-1/2 flex flex-col border-r border-gray-800">
            <div class="bg-[#161b22] px-4 py-1 text-[10px] uppercase font-bold text-gray-500">Editor</div>
            <textarea id="editor" class="flex-1 bg-[#0d1117] p-4 font-mono text-sm outline-none resize-none" spellcheck="false"></textarea>
        </div>

        <div class="w-1/2 flex flex-col">
            <div class="bg-[#161b22] px-4 py-1 text-[10px] uppercase font-bold text-gray-500 flex justify-between">
                <span>Terminal</span>
                <span id="status" class="text-gray-600">Disconnected</span>
            </div>
            <div id="terminal-container" class="flex-1 bg-black overflow-hidden"></div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
